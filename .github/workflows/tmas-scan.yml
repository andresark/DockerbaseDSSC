name: TMAS Scan

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  schedule:
    # Daily at 12:30 PM EDT (16:30 UTC)
    - cron: '30 16 * * *'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  source-scan:
    name: "Source: Vulnerabilities & Secrets"
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Scan source for vulnerabilities & secrets
        uses: trendmicro/tmas-scan-action@v3.1.3
        with:
          vulnerabilitiesScan: true
          malwareScan: false
          secretsScan: true
          artifact: dir:.
          additionalArgs: --region=us-east-1 --evaluatePolicy
          tmasApiKey: ${{ secrets.TMAS_API_KEY }}
          githubToken: ${{ secrets.GITHUB_TOKEN }}

  container-vulnerability-scan:
    name: "Container: Vulnerabilities & Secrets"
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build container image
        run: docker build -t dockerbase-dssc:scan .

      - name: Scan container for vulnerabilities & secrets
        uses: trendmicro/tmas-scan-action@v3.1.3
        with:
          vulnerabilitiesScan: true
          malwareScan: false
          secretsScan: true
          artifact: docker:dockerbase-dssc:scan
          additionalArgs: --region=us-east-1 --evaluatePolicy
          tmasApiKey: ${{ secrets.TMAS_API_KEY }}
          githubToken: ${{ secrets.GITHUB_TOKEN }}

  container-malware-scan:
    name: "Container: Malware Detection"
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build container image
        run: docker build -t dockerbase-dssc:scan .

      - name: Scan container for malware
        uses: trendmicro/tmas-scan-action@v3.1.3
        with:
          vulnerabilitiesScan: false
          malwareScan: true
          secretsScan: false
          artifact: docker:dockerbase-dssc:scan
          additionalArgs: --region=us-east-1 --evaluatePolicy
          tmasApiKey: ${{ secrets.TMAS_API_KEY }}
          githubToken: ${{ secrets.GITHUB_TOKEN }}
